<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📲 button-man</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📲%3C/text%3E%3C/svg%3E" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="hidden md:flex w-60 shrink-0 flex-col border-r border-slate-200 bg-white">
      <div class="flex items-center gap-2 px-5 py-5 border-b border-slate-200">
        <span class="text-2xl leading-none">📲</span>
        <span class="font-semibold tracking-tight">button-man</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
        <a href="#" class="block rounded-md px-3 py-2 bg-slate-100 text-slate-900 font-medium">대시보드</a>
        <a href="#" class="block rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100">메뉴 1</a>
        <a href="#" class="block rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100">메뉴 2</a>
        <a href="#" class="block rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100">메뉴 3</a>
        <a href="#" class="block rounded-md px-3 py-2 text-slate-600 hover:bg-slate-100">메뉴 4</a>
      </nav>
      <div class="px-5 py-4 text-xs text-slate-400 border-t border-slate-200">v0.1.0 · MVP</div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Header -->
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4">
        <div class="flex items-center gap-2">
          <span class="md:hidden text-2xl leading-none">📲</span>
          <h1 class="text-lg font-semibold tracking-tight">대시보드</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-500">caifyhelp@gmail.com</span>
          <div class="h-8 w-8 rounded-full bg-slate-200"></div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 p-6 space-y-6">
        <!-- KPI 카드 슬롯 -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          {% for i in range(4) %}
          <div class="rounded-xl border border-slate-200 bg-white p-5">
            <div class="text-xs font-medium text-slate-500">지표 {{ i + 1 }}</div>
            <div class="mt-2 text-2xl font-semibold tabular-nums">—</div>
            <div class="mt-1 text-xs text-slate-400">설명 자리</div>
          </div>
          {% endfor %}
        </section>

        <!-- 2단 콘텐츠 슬롯 -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div class="lg:col-span-2 rounded-xl border border-slate-200 bg-white p-5 min-h-[280px]">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-sm font-semibold">패널 A</h2>
              <span class="text-xs text-slate-400">—</span>
            </div>
            <div class="text-sm text-slate-400">콘텐츠 자리</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-5 min-h-[280px]">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-sm font-semibold">패널 B</h2>
              <span class="text-xs text-slate-400">—</span>
            </div>
            <div class="text-sm text-slate-400">콘텐츠 자리</div>
          </div>
        </section>

        <!-- 테이블 슬롯 -->
        <section class="rounded-xl border border-slate-200 bg-white p-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold">목록</h2>
            <span class="text-xs text-slate-400">—</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="text-left text-xs uppercase tracking-wider text-slate-500 border-b border-slate-200">
                <tr>
                  <th class="py-2 pr-4 font-medium">컬럼 1</th>
                  <th class="py-2 pr-4 font-medium">컬럼 2</th>
                  <th class="py-2 pr-4 font-medium">컬럼 3</th>
                  <th class="py-2 pr-4 font-medium">컬럼 4</th>
                </tr>
              </thead>
              <tbody class="text-slate-700">
                <tr class="border-b border-slate-100">
                  <td class="py-3 pr-4 text-slate-400" colspan="4">데이터 자리</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
